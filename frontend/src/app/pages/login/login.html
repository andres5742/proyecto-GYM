<div class="login-page">
  <div class="login-card">
    <img src="/logo-sport-gym.png" alt="Sport Gym R.IO" class="gym-logo login-logo" />
    <h1>Iniciar sesión</h1>
    <p>Personal del gimnasio o afiliados con documento y contraseña</p>

    @if (error()) {
      <p class="alert error">{{ error() }}</p>
    }

    <form [formGroup]="form" (ngSubmit)="submit()">
      <label>
        Usuario
        <input formControlName="username" autocomplete="username" placeholder="Usuario o documento" />
      </label>
      <label>
        Contraseña
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Tu contraseña"
        />
      </label>
      <button type="submit" [disabled]="saving()">
        {{ saving() ? 'Entrando...' : 'Entrar' }}
      </button>
    </form>

    <p class="login-hint">Demo: superadmin / admin123 · entrenador1 / entrenador123</p>
  </div>
</div>
