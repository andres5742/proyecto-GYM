<div class="login-page">
  <div class="login-card">
    <header class="login-card__brand">
      <img src="/logo-sport-gym.png" alt="Sport Gym R.IO" class="login-card__logo" />
      <h1>Iniciar sesión</h1>
      <p class="login-card__lead">
        Acceso para personal del gimnasio y afiliados. Use su usuario o documento y contraseña.
      </p>
    </header>

    @if (error()) {
      <p class="login-card__alert" role="alert">{{ error() }}</p>
    }

    <form class="login-form" [formGroup]="form" (ngSubmit)="submit()">
      <label class="login-field">
        <span class="login-field__label">Usuario</span>
        <input
          formControlName="username"
          autocomplete="username"
          placeholder="Usuario o número de documento"
          [class.login-field__input--invalid]="form.controls.username.touched && form.controls.username.invalid"
        />
      </label>
      <label class="login-field">
        <span class="login-field__label">Contraseña</span>
        <input
          type="password"
          formControlName="password"
          autocomplete="current-password"
          placeholder="Ingrese su contraseña"
          [class.login-field__input--invalid]="form.controls.password.touched && form.controls.password.invalid"
        />
      </label>
      <button type="submit" class="login-form__submit" [disabled]="saving()">
        {{ saving() ? 'Entrando…' : 'Entrar' }}
      </button>
    </form>

    <footer class="login-card__foot">
      <span>Sport Gym R.IO · Sistema de gestión</span>
    </footer>
  </div>
</div>
