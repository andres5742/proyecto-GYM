spring:
  application:
    name: gym-management
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gym_db}?sslmode=disable
    username: ${DB_USER:gym_user}
    password: ${DB_PASSWORD:gym_pass}
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 6MB

server:
  port: ${SERVER_PORT:8081}

app:
  upload:
    dir: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:4201,http://127.0.0.1:4201}
  jwt:
    secret: ${JWT_SECRET:gym-sport-rio-secret-key-change-in-production-min-32-chars}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  access:
    device-api-key: ${ACCESS_DEVICE_KEY:gym-turnstile-dev-key}
    turnstile-webhook-url: ${TURNSTILE_WEBHOOK:}
    # Distancia euclidiana face-api: menor = más parecido (típico 0.45–0.55)
    face-match-max-distance: ${FACE_MATCH_MAX_DISTANCE:0.55}
  sales:
    # (Legacy) Categorías de producto usadas solo si aún venden pases como producto en inventario.
    workout-day-product-categories: ${WORKOUT_DAY_CATEGORIES:ENTRENO_DIA,ENTRENO,Plan entreno}
    workout-day-name-keywords: ${WORKOUT_DAY_KEYWORDS:entreno,pase,día,dia}
  billing:
    day-workout-plan-name: ${DAY_WORKOUT_PLAN_NAME:Entreno día}
    sports-dance-plan-name: ${SPORTS_DANCE_PLAN_NAME:Bailes deportivos}
